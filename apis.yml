apis:
  - aid: bettercloud:bettercloud-platform-api
    name: BetterCloud Platform API
    description: >-
      The BetterCloud Platform API provides REST API access for managing SaaS
      application operations, automated workflows, and security policies. It
      enables IT and security teams to programmatically automate management
      workflows and enforce security policies across cloud technology stacks
      using standard HTTP methods.
